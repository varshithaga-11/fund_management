version: '3.8'

services:
  db:
    image: postgres:16
    container_name: fund_management_db
    environment:
      POSTGRES_DB: fund_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '1234'
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: fund_management_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:1234@db:5432/fund_management
      - DEBUG=True
    depends_on:
      - db

volumes:
  postgres_data:
