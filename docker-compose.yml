version: '3.8'

services:
  db:
    image: postgres:16
    container_name: fund_management_db
    environment:
      POSTGRES_DB: fund_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '1234'
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fund_management"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: fund_management_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    restart: always
    environment:
      - POSTGRES_DB=fund_management
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
      - POSTGRES_HOST=db
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
